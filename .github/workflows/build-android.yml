# ============================================================================
#  FLUX — Cloud APK builder (GitHub Actions)
# ----------------------------------------------------------------------------
#  Compiles a native Android APK entirely in the cloud. No Android Studio,
#  no local SDK — nothing runs on your PC. Just:
#
#    1. Push this project to a GitHub repo (public = unlimited free minutes).
#    2. Open the repo → "Actions" tab → "FLUX Android APK" → "Run workflow".
#    3. Wait ~3–4 min, open the finished run, scroll to "Artifacts",
#       click "app-debug-apk" → your .apk downloads.
#
#  This is the same pipeline as build-android.sh, executed on GitHub's cloud
#  runners (Ubuntu, real Android SDK + Gradle, plenty of RAM).
# ============================================================================
name: FLUX Android APK

on:
  workflow_dispatch: {} # manual "Run workflow" button in the Actions tab
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK (Android Gradle needs Java 21)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install web dependencies
        run: npm install

      - name: Build the web app (dist/)
        run: npm run build

      - name: Generate native icon + splash
        run: npx @capacitor/assets generate --icon --splash || true

      - name: Add Android platform (if not present)
        run: |
          if [ ! -d "android" ]; then npx cap add android; else echo "android/ exists"; fi

      - name: Sync web assets + plugins into native project
        run: npx cap sync android

      - name: Fix duplicate Kotlin stdlib classes (init script)
        run: |
          mkdir -p ~/.gradle/init.d
          cp .github/gradle/kotlin-stdlib-fix.gradle ~/.gradle/init.d/

      - name: Compile debug APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload the APK as a downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
